{% extends "admin/base_site.html" %}

{% block content %}
  <h1>Gerar Token JWT</h1>
  <p>Pressione o botão abaixo para gerar um novo token JWT para o usuário logado.</p>
  
  <form method="get" action="{% url 'admin:gerar_token' %}">
    <button type="submit" class="button">Gerar Token</button>
  </form>

  {% if token %}
    <h3>Token Gerado:</h3>
    <code>{{ token }}</code>
  {% endif %}
{% endblock %}
